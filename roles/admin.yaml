# LISA Windows Agent — System Administrator Role
# =================================================
activities:

  - action: run_powershell
    commands:
      - "Get-Service | Where-Object {$_.Status -eq 'Running'} | Select-Object -First 10"
      - "Get-Process | Sort-Object CPU -Descending | Select-Object -First 10"
      - "Get-EventLog -LogName System -Newest 5 | Format-Table TimeGenerated,EntryType,Message -AutoSize"
      - "Get-NetIPConfiguration | Select-Object InterfaceAlias,IPv4Address,DNSServer"
      - "Get-Disk | Select-Object Number,FriendlyName,Size,HealthStatus"
      - "Get-LocalUser | Select-Object Name,Enabled,LastLogon"
      - "Get-ScheduledTask | Where-Object {$_.State -eq 'Ready'} | Select-Object -First 5"
    weight: 3

  - action: run_cmd
    commands:
      - "ipconfig /all"
      - "netstat -an | findstr ESTABLISHED"
      - "systeminfo | findstr /C:\"OS Name\" /C:\"Total Physical Memory\""
      - "net user"
      - "net share"
      - "arp -a"
    weight: 3

  - action: registry_read
    key: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion"
    value: "ProductName"
    weight: 2

  - action: registry_read
    key: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion"
    value: "CurrentBuildNumber"
    weight: 1

  - action: registry_read
    key: "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters"
    value: "Hostname"
    weight: 1

  - action: registry_write
    key: "HKCU\\Software\\LISA"
    value: "LastAdminCheck"
    weight: 1

  - action: create_scheduled_task
    name: "LISADailyCleanup"
    execute: "cleanmgr.exe"
    at: "22:00"
    weight: 1

  # server loaded from .env
  - action: smb_access
    share: "share"
    smb_action: "browse"
    weight: 2

  - action: open_browser
    urls:
      - "https://docs.microsoft.com/en-us/windows-server/administration"
      - "https://google.com"
      - "https://bing.com"
      - "https://technet.microsoft.com"
    weight: 2

  - action: outlook_read
    weight: 2

  - action: outlook_email
    recipients:
      - "lisalinux@lisa.local"
      - "lisawindows@lisa.local"
      - "lisaserver@lisa.local"
    weight: 2
  # ── Idle ──────────────────────────────────────────────────────────
  - action: sleep
    seconds: 240
    weight: 2