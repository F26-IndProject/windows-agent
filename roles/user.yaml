# LISA Windows Agent — Office Worker Role
# ==========================================
activities:
  - action: outlook_read
    weight: 2

  - action: outlook_email
    recipients:
      - "lisalinux@lisa.local"
      - "lisawindows@lisa.local"
      - "lisaserver@lisa.local"

    weight: 2

  - action: word_document
    filenames:
      - "weekly_report.docx"
      - "meeting_notes.docx"
      - "project_plan.docx"
      - "status_update.docx"
    weight: 2

  - action: excel_spreadsheet
    filename: "monthly_data.xlsx"
    weight: 2

  - action: open_browser
    urls:
      - "https://google.com"
      - "https://bing.com"
      - "https://yandex.com"
      - "https://wikipedia.org"
      - "https://weather.com"
      - "https://news.google.com"
    weight: 2

  # server loaded from .env
  - action: smb_access
    share: "share"
    smb_action: "browse"
    weight: 2

  - action: create_file
    path: "%USERPROFILE%\\Documents\\notes.txt"
    content: "Quick notes from today. Follow up needed on Q3 deliverables."
    weight: 1
  # ── Idle ──────────────────────────────────────────────────────────
  - action: sleep
    seconds: 240
    weight: 2
