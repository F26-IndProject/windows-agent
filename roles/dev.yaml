# LISA Windows Agent — Developer Role
# ======================================
# Simulates a Windows developer:
# - Uses VS Code for coding
# - Runs PowerShell and Git commands
# - Browses developer resources
# - Works with Word for documentation
# - Accesses SMB shares
# - Sends and reads email

activities:

  # ── VS Code ────────────────────────────────────────────────────────
  - action: open_app
    app: vscode
    weight: 3

  # ── PowerShell — developer commands ───────────────────────────────
  - action: run_powershell
    commands:
      - "git status 2>$null || Write-Host 'Not a git repo'"
      - "git log --oneline -5 2>$null || Write-Host 'No git history'"
      - "python --version; pip list | Select-Object -First 5"
      - "Get-ChildItem -Recurse -Filter *.py | Select-Object -First 10 FullName"
      - "docker ps 2>$null || Write-Host 'Docker not running'"
    weight: 3

  # ── CMD commands ───────────────────────────────────────────────────
  - action: run_cmd
    commands:
      - "dir /s *.py | find /c \".py\""
      - "python -c \"print('Hello World')\""
    weight: 2

  # ── Web browsing ───────────────────────────────────────────────────
  - action: open_browser
    urls:
      - "https://stackoverflow.com"
      - "https://github.com"
      - "https://google.com"
      - "https://bing.com"
      - "https://docs.python.org"
      - "https://docs.microsoft.com"
      - "https://yandex.com"
    weight: 3

 # ── Word for documentation ─────────────────────────────────────────
  - action: word_document
    filenames:
      - "technical_spec.docx"
      - "api_documentation.docx"
      - "architecture_notes.docx"
    weight: 2

  # ── SMB share ─────────────────────────────────────────────────────
  # server loaded from .env
  - action: smb_access
    share: "share"
    smb_action: "browse"
    weight: 2

  #── Email ──────────────────────────────────────────────────────────
  - action: outlook_read
    weight: 2

  - action: outlook_email
    recipients:
      - "lisalinux@lisa.local"
      - "lisawindows@lisa.local"
      - "lisaserver@lisa.local"
    weight: 2

  # ── Idle ──────────────────────────────────────────────────────────
  - action: sleep
    seconds: 240
    weight: 2
